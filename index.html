<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sam's Books</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; color: #111; min-height: 100vh; }
        .header { background: #fff; border-bottom: 1px solid #eef0f2; padding: 14px 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header-nav { display: flex; justify-content: center; gap: 24px; }
        .header-nav a { font-size: 0.9rem; font-weight: 500; color: #555; text-decoration: none; }
        .header-nav a.active { color: #2e7d32; font-weight: 700; }
        .page-title { text-align: center; padding: 50px 20px 30px; }
        .page-title h1 { font-family: 'Noto Serif KR', serif; font-size: 2rem; font-weight: 700; color: #111; margin-bottom: 10px; }
        .books-slider-section { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
        .slider-container { position: relative; overflow: hidden; border-radius: 12px; }
        .slider-track { display: flex; transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94); will-change: transform; touch-action: pan-y; }
        .slide { flex: 0 0 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; background: #ffffff; }
        .book-img-wrap { width: 200px; height: 280px; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.15); margin-bottom: 32px; background: #e8e4de; display: flex; align-items: center; justify-content: center; }
        .book-info { max-width: 560px; width: 100%; text-align: center; }
        
        /* 버튼 위치 배치 및 터치 기능 개선 */
        .slider-arrows { position: absolute; top: 120px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 10px; z-index: 5; pointer-events: none; }
        .arrow-btn { width: 44px; height: 44px; border-radius: 50%; background: #fff; border: 1px solid #ddd; font-size: 1.2rem; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.06); pointer-events: auto; }
        .arrow-btn:hover { background: #2e7d32; border-color: #2e7d32; color: #fff; }
        .arrow-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }
        
        .slider-dots { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; cursor: pointer; transition: all 0.2s ease; }
        .dot.active { background: #2e7d32; width: 24px; border-radius: 4px; }
    </style>
</head>
<body>
    <header class="header">
        <nav class="header-nav">
            <a href="/">Home</a>
            <a href="https://samleestory.blogspot.com/p/sam-lee_0542657907.html">About</a>
            <a href="#" class="active">Books</a>
            <a href="https://samleestory.blogspot.com">Story</a>
        </nav>
    </header>
    <div class="page-title"><h1>Sam's Books</h1></div>
    <div class="books-slider-section">
        <div class="slider-container">
            <div class="slider-track" id="sliderTrack">
                <div class="slide"><div class="book-img-wrap">📖 책 1</div><div class="book-info"><h2>자녀와 함께 읽는 프레임 성경</h2></div></div>
                <div class="slide"><div class="book-img-wrap">📖 책 2</div><div class="book-info"><h2>FRAME BIBLE</h2></div></div>
            </div>
            <div class="slider-arrows">
                <button class="arrow-btn disabled" id="prevBtn">&#8592;</button>
                <button class="arrow-btn" id="nextBtn">&#8594;</button>
            </div>
        </div>
        <div class="slider-dots" id="sliderDots"></div>
    </div>
    <script>
        const track = document.getElementById('sliderTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const dotsContainer = document.getElementById('sliderDots');
        const slides = track.querySelectorAll('.slide');
        let current = 0;

        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => goTo(i));
            dotsContainer.appendChild(dot);
        });

        function goTo(index) {
            current = Math.max(0, Math.min(index, slides.length - 1));
            track.style.transform = `translateX(-${current * 100}%)`;
            document.querySelectorAll('.dot').forEach((d, i) => { d.classList.toggle('active', i === current); });
            prevBtn.classList.toggle('disabled', current === 0);
            nextBtn.classList.toggle('disabled', current === slides.length - 1);
        }

        prevBtn.addEventListener('click', () => goTo(current - 1));
        nextBtn.addEventListener('click', () => goTo(current + 1));

        let startX = 0;
        track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
        track.addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
        });
    </script>
</body>
</html>
